# BrandSite Pro - Admin Panel Nginx Config
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/

# IMPORTANT: Restrict admin access by IP for security
# Change allow/deny rules to match your IP

server {
    listen 80;
    server_name admin.yourdomain.com;

    # IP whitelist - CHANGE THESE to your actual IPs
    allow 127.0.0.1;
    # allow YOUR.IP.HERE;
    deny all;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Admin panel + API
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Rate limit for tracker endpoints (open to all)
    location ~ ^/(t|pv)$ {
        allow all;
        limit_req zone=tracker burst=50 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health {
        allow all;
        proxy_pass http://127.0.0.1:8080;
    }
}
