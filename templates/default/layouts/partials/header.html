{{ $p := .Site.Params }}
{{ $pfx := $p.css_prefix }}
<header class="{{ $pfx }}-header">
  <div class="{{ $pfx }}-container {{ $pfx }}-header-inner">
    <a href="/" class="{{ $pfx }}-logo">{{ $p.brand_name }}</a>
    <nav class="{{ $pfx }}-nav">
      <a href="/">首頁</a>
      <a href="/about/">關於</a>
      {{ if $p.cta_text }}
      <a href="{{ $p.redirect_url }}" class="{{ $pfx }}-nav-cta" rel="nofollow"
         data-action="cta-nav"
         onclick="{{ $p.track_fn_name }}(this); return false;">{{ $p.cta_text }}</a>
      {{ end }}
    </nav>
  </div>
</header>
