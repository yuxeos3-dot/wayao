{{ $p := .Site.Params }}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>{{ $p.page_title | default .Title | default $p.brand_name }}</title>
<meta name="description" content="{{ $p.meta_desc }}">
<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1">
<link rel="canonical" href="{{ .Permalink }}">

<!-- Hreflang (multi-market) -->
{{ if $p.hreflang_tags }}
{{ $p.hreflang_tags | safeHTML }}
{{ end }}

<!-- Preconnect (INP optimization) -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
{{ if $p.tracker_url }}<link rel="preconnect" href="{{ $p.tracker_url }}" crossorigin>{{ end }}
<link rel="dns-prefetch" href="https://fonts.googleapis.com">

<!-- Open Graph -->
<meta property="og:title" content="{{ $p.page_title | default $p.brand_name }}">
<meta property="og:description" content="{{ $p.meta_desc }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ $p.brand_name }}">
<meta property="og:locale" content="{{ $p.market | default "zh_TW" }}">
{{ if $p.tracker_url }}
<meta property="og:image" content="{{ $p.tracker_url }}/og/{{ $p.site_id | default $p.primary_keyword }}.svg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
{{ end }}

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ $p.page_title | default $p.brand_name }}">
<meta name="twitter:description" content="{{ $p.meta_desc }}">

<!-- Schema JSON-LD -->
{{ if $p.schema_json }}
<script type="application/ld+json">
{{ $p.schema_json | safeHTML }}
</script>
{{ end }}

<!-- Speakable (voice search) -->
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebPage","speakable":{"@type":"SpeakableSpecification","cssSelector":[".{{ $p.css_prefix }}-hero-title",".{{ $p.css_prefix }}-intro"]}}
</script>

<!-- Theme Color -->
<meta name="theme-color" content="{{ $p.brand_color | default "#1976D2" }}">

<!-- Critical CSS inlined + non-critical deferred (INP/CLS optimization) -->
<style>
:root {
  --primary: {{ $p.brand_color | default "#1976D2" }};
  --primary-dark: {{ $p.brand_color_dark | default "#0D47A1" }};
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:{{ $p.font_stack | default "-apple-system,BlinkMacSystemFont,'Noto Sans TC',Roboto,sans-serif" }};color:#333;line-height:1.65}
img{max-width:100%;height:auto;display:block}
a{color:var(--primary);text-decoration:none}
{{ $p.css_noise | safeHTML }}
</style>
<link rel="stylesheet" href="/css/style.css?v={{ $p.build_id | default "1" }}" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="/css/style.css?v={{ $p.build_id | default "1" }}"></noscript>

<!-- Unique favicon per domain -->
{{ if $p.favicon_svg }}
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,{{ $p.favicon_svg }}">
{{ end }}
